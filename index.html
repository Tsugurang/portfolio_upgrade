<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Portfolio</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <style>
    :root {
      --bg-light: #fafafa;
      --bg-dark: #111214;
      --fg-dark: #1a1a1a;
      --fg-muted: #767676;
      --accent: #5a3eff;
      --border: #e4e4e4;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
    }
    html, body { margin: 0; height: 100%; overflow: hidden; }
    body { font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; background: var(--bg-light); color: var(--fg-dark); }

    .scroll-container {
      height: 100vh;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scroll-behavior: smooth;
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    .scroll-container::-webkit-scrollbar { display: none; }

    .section {
      text-align: center;
      padding: 0 1rem;
      height: 100vh;
      box-sizing: border-box;
      scroll-snap-align: start;
      scroll-snap-stop: always;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .section.in-view { opacity: 1; transform: translateY(0); }
    .section#home, .section#about { transition: opacity 1s ease, transform 1s ease; }

    .dots { position: fixed; right: 2rem; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 14px; z-index: 50; }
    .dots button { width: 8px; height: 8px; padding: 0; border-radius: 50%; border: 1.5px solid var(--fg-muted); background: transparent; cursor: pointer; transition: background 0.25s ease, border-color 0.25s ease, transform 0.25s ease; }
    .dots button.active { background: var(--fg-dark); border-color: var(--fg-dark); transform: scale(1.3); }
    .dots.on-dark button { border-color: rgba(255, 255, 255, 0.5); }
    .dots.on-dark button.active { background: #fff; border-color: #fff; }

    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(40px); } 100% { opacity: 1; transform: translateY(0); } }
    .fade-up { opacity: 0; animation: fadeUp 1s ease-out forwards; animation-delay: 0.3s; }

    @font-face {
      font-family: 'Heading Pro Trial';
      src: url('HeadingProTrial-Book.woff2') format('woff2'),
           url('HeadingProTrial-Book.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Heading Pro Trial-Bold';
      src: url('font/HeadingProTrial-Bold.woff2') format('woff2'),
           url('font/HeadingProTrial-Bold.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }

    .section#about {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at center, rgba(0,0,0,0) 80%, rgba(0,0,0,0.5) 130%);
      z-index: 1;
    }
    .about-image { display: flex; justify-content: center; align-items: center; width: 100%; }
    .about-image img { height: auto; width: 100%; max-width: 900px; object-fit: contain; }

    .mac-container { margin: 0 auto; background: var(--bg-light); border: 1px solid var(--border); border-radius: 20px; width: 90%; height: 90vh; overflow: hidden; position: relative; display: flex; flex-direction: column; box-shadow: var(--shadow); }
    .mac-titlebar { height: 36px; background: #efefef; display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid var(--border); }
    .mac-buttons { display: flex; gap: 6px; }
    .mac-buttons div, .window-buttons div { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
    .close { background: #ff5f56; }
    .minimize { background: #ffbd2e; }
    .maximize { background: #27c93f; }
    .mac-body { position: relative; width: 100%; height: 100%; padding: 3rem 4rem; box-sizing: border-box; }
    .folder { position: absolute; text-align: center; cursor: grab; user-select: none; }
    .folder img { width: 130px; filter: drop-shadow(0px 4px 4px rgba(0,0,0,0.12)); transition: transform 0.25s ease, filter 0.25s ease; }
    .folder:hover img { transform: translateY(-4px); filter: drop-shadow(0px 10px 14px rgba(0,0,0,0.16)); }
    .folder .label { color: var(--fg-muted); font-size: 0.85rem; letter-spacing: 0.02em; margin-top: 0.6rem; }
    .tab-bar { display: flex; gap: 6px; margin-left: 20px; }
    .tab { background: #e2e2e2; padding: 5px 10px; border-radius: 4px 4px 0 0; cursor: pointer; color: var(--fg-muted); font-size: 0.85rem; display: flex; align-items: center; gap: 4px; }
    .tab.active { background: var(--bg-light); font-weight: bold; color: var(--fg-dark); }
    .tab .close-btn { font-weight: bold; cursor: pointer; }
    iframe.content-frame { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; z-index: 10; background: var(--bg-light); }

    .mail-link { transition: border-color 0.25s ease; }
    .mail-link:hover { border-bottom-color: var(--accent); }

    @media (max-width: 768px) {
      .mac-container { width: 95%; height: 85vh; }
      .mac-body { padding: 1.2rem 1rem; }
      .folder img { width: 78px; }
      .mac-body.mobile-layout {
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        gap: 1.2rem;
        overflow-y: auto;
      }
      .mac-body.mobile-layout .folder {
        position: static;
        cursor: default;
      }
      .dots { right: 0.9rem; gap: 10px; }
    }
</style>
</head>
<body>
<div class="scroll-container" id="scrollContainer">
  <div class="section" id="home" style="display: flex; align-items: center; justify-content: flex-start; padding-left: 8vw; background: radial-gradient(circle at center, #ffffff, var(--bg-light) 55%, #ececec 100%); text-align: left; overflow: hidden;">
    <div class="fade-up" style="position: absolute; top: 20%; left: 8vw; transform: translateY(-50%);">
      <h1 style="font-size: clamp(1.6rem, 5vw, 2.8rem); font-weight: 600; letter-spacing: -0.01em; margin-bottom: clamp(3rem, 18vw, 13rem); margin-top: 0px; color: var(--fg-dark);">2025<br><span style="font-size: clamp(3rem, 16vw, 10rem); font-family: 'Heading Pro Trial'; letter-spacing: -0.02em; color: var(--fg-dark);">PORTFOLIO</span></h1>
      <p style="font-size: clamp(1rem, 3vw, 1.8rem); max-width: 600px; line-height: 1.7; font-weight: 600; letter-spacing: 0.02em; color: var(--fg-muted);">JEONG CHAN HEE</p>
    </div>
  </div>
  <div class="section" id="about">
    <div class="about-image"><img src="aboutf.webp" alt="About me" loading="lazy" decoding="async"></div>
  </div>
  <div class="section" id="projects">
    <div class="mac-container" id="macContainer">
      <div class="mac-titlebar">
        <div class="mac-buttons"><div class="close"></div><div class="minimize"></div><div class="maximize"></div></div>
        <div class="tab-bar"><div class="tab active" data-link="home"><i class='bx bx-home'></i></div></div>
      </div>
      <div class="mac-body" id="macBody">
        <iframe class="content-frame" id="contentFrame"></iframe>
        <div class="folder" data-link="image-viewer.html?img=Typography.webp"><img src="folderp.webp" alt=""><div class="label">Typography</div></div>
        <div class="folder" data-link="image-viewer2.html"><img src="folderp.webp" alt=""><div class="label">Web</div></div>
        <div class="folder" data-link="image-viewer.html?img=Frame 9.webp"><img src="folderp.webp" alt=""><div class="label">Graphic</div></div>
        <div class="folder" data-link="image-viewer.html?img=bx.webp"><img src="folderp.webp" alt=""><div class="label">BX 01</div></div>
        <div class="folder" data-link="image-viewer3.html"><img src="folderp.webp" alt=""><div class="label">BX 02</div></div>
        <div class="folder" data-link="image-viewer4.html"><img src="folderp.webp" alt=""><div class="label">BX 03</div></div>
        <div class="folder" data-link="Interaction.html"><img src="folder.webp" alt=""><div class="label">Interaction</div></div>
        <div class="folder" data-link="MotionGraphic.html"><img src="folder.webp" alt=""><div class="label">Motion Graphic</div></div>
      </div>
    </div>
  </div>
  <div class="section" id="contact" style="display: flex; flex-direction: column; justify-content: center; align-items: center; background: var(--bg-dark); color: #222; text-align: left;">
    <p style="color: #fff; font-size: clamp(1.2rem, 4vw, 2.3rem); font-weight: 300; margin-bottom: 20px; padding: 0 1rem; text-align: center;">함께 일할 그래픽 디자이너를 찾고 계신가요?</p>
    <h1 style="color: #fff; font-size: clamp(1.6rem, 8vw, 5rem); font-weight: 700; letter-spacing: -0.01em; margin-top: 0rem; margin-bottom: 1.2rem; padding: 0 1rem; text-align: center; word-break: break-word;">chanhee.jeong0@gmail.com</h1>
    <a href="mailto:chanhee.jeong0@gmail.com" class="mail-link" style="text-decoration: none; color: var(--accent); font-weight: 600; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid transparent;">메일 보내기 ➔</a>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{
  const macBody=document.getElementById('macBody');
  const folders=macBody.querySelectorAll('.folder');
  const tabBar=document.querySelector('.tab-bar');
  const contentFrame=document.getElementById('contentFrame');
  const tabs={};
  const placed=[];
  const containerRect=macBody.getBoundingClientRect();
  const folderSize=130,padding=20;
  const isMobile=window.matchMedia('(max-width: 768px)').matches;
  if(isMobile)macBody.classList.add('mobile-layout');

  function isOverlapping(x,y){
    return placed.some(pos=>Math.abs(pos.x-x)<folderSize+padding&&Math.abs(pos.y-y)<folderSize+padding);
  }

  function openLink(folder){
    const link=folder.getAttribute('data-link'),label=folder.querySelector('.label').textContent;
    if(!tabs[link]){
      const tab=document.createElement('div');tab.className='tab';tab.dataset.link=link;
      tab.innerHTML=`${label} <span class="close-btn">x</span>`;
      tab.querySelector('.close-btn').addEventListener('click',(e)=>{e.stopPropagation();tab.remove();delete tabs[link];const remaining=Object.keys(tabs);if(remaining.length)activateTab(remaining[0]);else activateTab('home');});
      tab.addEventListener('click',()=>activateTab(link));
      tabBar.appendChild(tab);tabs[link]=true;
    }
    activateTab(link);
  }

  folders.forEach(folder=>{
    if(!isMobile){
      let x,y,tries=0;
      do{
        x=Math.random()*(containerRect.width-folderSize-padding*2)+padding;
        y=Math.random()*(containerRect.height-folderSize-padding*2)+padding;
        tries++;
      }while(isOverlapping(x,y)&&tries<100);
      folder.style.left=`${x}px`;folder.style.top=`${y}px`;placed.push({x,y});

      folder.addEventListener('pointerdown',e=>{
        e.preventDefault();const offsetX=e.clientX-folder.offsetLeft,offsetY=e.clientY-folder.offsetTop;
        const onMove=ev=>{folder.style.left=`${ev.clientX-offsetX}px`;folder.style.top=`${ev.clientY-offsetY}px`;};
        const onUp=()=>{document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp);};
        document.addEventListener('pointermove',onMove);document.addEventListener('pointerup',onUp);
      });

      folder.addEventListener('dblclick',()=>openLink(folder));
    } else {
      folder.addEventListener('click',()=>openLink(folder));
    }
  });

  function activateTab(link){
    document.querySelectorAll('.tab').forEach(tab=>tab.classList.remove('active'));
    const tab=document.querySelector(`.tab[data-link="${link}"]`);if(tab)tab.classList.add('active');
    if(link==="home")contentFrame.style.display="none";else{contentFrame.src=link;contentFrame.style.display="block";}
  }

  document.querySelector('.tab[data-link="home"]').addEventListener('click',()=>activateTab("home"));

  const sections=Array.from(document.querySelectorAll('.scroll-container > .section'));
  const dotsNav=document.createElement('nav');
  dotsNav.className='dots';
  sections.forEach(sec=>{
    const btn=document.createElement('button');
    btn.setAttribute('aria-label',`go to ${sec.id}`);
    btn.addEventListener('click',()=>sec.scrollIntoView({behavior:'smooth'}));
    dotsNav.appendChild(btn);
  });
  document.body.appendChild(dotsNav);
  const dotButtons=dotsNav.querySelectorAll('button');

  const sectionObserver=new IntersectionObserver(entries=>{
    entries.forEach(entry=>{
      entry.target.classList.toggle('in-view',entry.isIntersecting);
      if(entry.isIntersecting){
        const idx=sections.indexOf(entry.target);
        dotButtons.forEach(b=>b.classList.remove('active'));
        dotButtons[idx].classList.add('active');
        dotsNav.classList.toggle('on-dark',entry.target.id==='contact');
      }
    });
  },{threshold:0.5});
  sections.forEach(sec=>sectionObserver.observe(sec));
});
</script>
</body>
</html>
