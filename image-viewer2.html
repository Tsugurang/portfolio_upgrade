<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Image Viewer</title>
  <style>
    body { background: #000; margin: 0; text-align: center; }
    /* Capped, centered column (black fills the sides); the parent adds
       .max to <body> while the mac window is fullscreen to lift the cap. */
    img { display: block; width: 100%; max-width: 1000px; height: auto; margin: 0 auto; }
    body.max img { max-width: none; }
  </style>
</head>
<body>
  <img src="j/j1.webp" alt="j1" loading="eager" decoding="async">
  <img src="j/j2.webp" alt="j2" loading="lazy" decoding="async">
  <img src="j/j3.webp" alt="j3" loading="lazy" decoding="async">
  <img src="j/j4.webp" alt="j4" loading="lazy" decoding="async">
  <img src="j/j5.webp" alt="j5" loading="lazy" decoding="async">
  <img src="j/j6.webp" alt="j6" loading="lazy" decoding="async">
  <img src="j/j7.webp" alt="j7" loading="lazy" decoding="async">
  <img src="j/j8.webp" alt="j8" loading="lazy" decoding="async">
  <img src="j/j9.webp" alt="j9" loading="lazy" decoding="async">
  <img src="j/j10.webp" alt="j10" loading="lazy" decoding="async">
  <img src="j/j11.webp" alt="j11" loading="lazy" decoding="async">
  <img src="j/j12.webp" alt="j12" loading="lazy" decoding="async">
  <img src="j/j13.webp" alt="j13" loading="lazy" decoding="async">
</body>
</html>
