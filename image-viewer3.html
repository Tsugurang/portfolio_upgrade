<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Image Viewer</title>
  <style>
    body { background: #ffffff; margin: 0; text-align: center; }
    img { display: block; width: 100%; max-width: 100%; height: auto; }
  </style>
</head>
<body>
  <img src="c1.png" alt="c1" loading="eager" decoding="async">
  <img src="c2.png" alt="c2" loading="lazy" decoding="async">
</body>
</html>
